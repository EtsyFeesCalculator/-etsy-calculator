<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Etsy Fee Calculator – How Much Does Etsy Take?</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      background:#020617;
      padding:15px;
      border-radius:12px;
    }

    .big {
      font-size: 20px;
      font-weight: bold;
    }

    .bad { color: #f87171; }
    .good { color: #4ade80; }

    .share {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }

    .cta {
      margin-top: 15px;
      padding: 12px;
      background: #111827;
      border-radius: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>💰 How Much Does Etsy Actually Take?</h1>
    <p>😳 Etsy takes more than you think. Try your numbers.</p>

    <input type="number" id="price" placeholder="Sale Price ($)">
    <input type="number" id="shipping" placeholder="Shipping Charged ($)">
    <input type="number" id="cost" placeholder="Your Cost (materials + labor)">
    <input type="number" id="shipcost" placeholder="Your Shipping Cost">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>

  </div>

<script>
function calculate() {
  let price = parseFloat(document.getElementById("price").value) || 0;
  let shipping = parseFloat(document.getElementById("shipping").value) || 0;
  let cost = parseFloat(document.getElementById("cost").value) || 0;
  let shipcost = parseFloat(document.getElementById("shipcost").value) || 0;

  let gross = price + shipping;

  let listing = 0.20;
  let transaction = gross * 0.065;
  let processing = gross * 0.03 + 0.25;

  let fees = listing + transaction + processing;

  let profit = gross - fees - cost - shipcost;
  let margin = gross > 0 ? (profit / gross) * 100 : 0;

  let salesNeeded = profit > 0 ? Math.ceil(1000 / profit) : "∞";

  // Suggested price for 30% margin
  let targetMargin = 0.3;
  let suggestedPrice = (cost + shipcost + fees) / (1 - targetMargin);

  let message = margin >= 30 
    ? "Good margin ✅" 
    : "You're underpricing ❌";

  document.getElementById("result").innerHTML = `
    <div class="big">😳 Etsy takes: $${fees.toFixed(2)}</div>
    You keep: <b>$${profit.toFixed(2)}</b><br>
    Margin: ${margin.toFixed(1)}%<br><br>

    <span class="${margin>=30?'good':'bad'}">${message}</span><br><br>

    🔥 You're working for <b>$${profit.toFixed(2)}</b> on a $${gross.toFixed(2)} sale<br><br>

    💡 To hit 30% margin:<br>
    👉 Charge: <b>$${suggestedPrice.toFixed(2)}</b><br><br>

    📈 ${salesNeeded} sales = $1,000/month<br>

    <div class="share">👀 Share this with another Etsy seller</div>

    <div class="cta">
      💰 Want better margins? Create listings that actually make profit.
    </div>
  `;
}
</script>

</body>
</html>
